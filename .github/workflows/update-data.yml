name: Update CFTC Report Data

on:
  schedule:
    # 每周五 22:00 UTC = 周六 06:00 CST (北京时间)，美股收盘后约2小时
    - cron: '0 22 * * 5'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate even if report exists'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL: ${{ secrets.DEEPSEEK_API_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          PAGES_BASE_URL: https://mr-chatwin.github.io/cft.report/
        run: node scripts/update-data.mjs

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update CFTC report data ($(date +%Y-%m-%d))"
            git push
          fi
